<!DOCTYPE html>
<html>
<head>
    <title>Tap The Circle Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #f4f4f4;
        }

        #gameArea {
            width: 300px;
            height: 400px;
            border: 2px solid black;
            margin: auto;
            position: relative;
            background-color: white;
        }

        #circle {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            display: none;
        }

        #score {
            font-size: 20px;
        }

        #timer {
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>Tap The Circle!</h1>
<p id="score">Score: 0</p>
<p id="timer">Time: 30</p>
<button onclick="startGame()">Start Game</button>

<div id="gameArea">
    <div id="circle" onclick="increaseScore()"></div>
</div>

<script>
let score = 0;
let timeLeft = 30;
let gameInterval;

function startGame() {
    score = 0;
    timeLeft = 30;
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("timer").innerText = "Time: " + timeLeft;
    document.getElementById("circle").style.display = "block";
    moveCircle();

    gameInterval = setInterval(function() {
        timeLeft--;
        document.getElementById("timer").innerText = "Time: " + timeLeft;

        if (timeLeft <= 0) {
            clearInterval(gameInterval);
            document.getElementById("circle").style.display = "none";
            alert("Game Over! Your Score: " + score);
        }
    }, 1000);
}

function increaseScore() {
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    moveCircle();
}

function moveCircle() {
    let gameArea = document.getElementById("gameArea");
    let circle = document.getElementById("circle");

    let maxX = gameArea.clientWidth - circle.clientWidth;
    let maxY = gameArea.clientHeight - circle.clientHeight;

    let randomX = Math.floor(Math.random() * maxX);
    let randomY = Math.floor(Math.random() * maxY);

    circle.style.left = randomX + "px";
    circle.style.top = randomY + "px";
}
</script>

</body>
</html>
