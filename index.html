<!DOCTYPE html>
<html>
<head>
  <title>King Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 250px;
    }

    button {
      padding: 12px;
      margin: 5px;
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>👑 King Chat App</h1>

<h3>Register</h3>

<input type="email" id="email" placeholder="Enter email"><br>
<input type="password" id="password" placeholder="Enter password"><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXTg2RHlKjug5nCx6UTJ6v4jiIVElaRlY",
  authDomain: "king-chat-app-a30e4.firebaseapp.com",
  projectId: "king-chat-app-a30e4",
  storageBucket: "king-chat-app-a30e4.firebasestorage.app",
  messagingSenderId: "791983811270",
  appId: "1:791983811270:web:6a8973ad8e1240a81e45c7",
  measurementId: "G-KS9CCMLCQN"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.register = function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
  .then(() => {
    document.getElementById("status").innerText = "✅ Registered successfully";
  })
  .catch(error => {
    document.getElementById("status").innerText = error.message;
  });

}

window.login = function() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(() => {
    document.getElementById("status").innerText = "✅ Logged in successfully";
  })
  .catch(error => {
    document.getElementById("status").innerText = error.message;
  });

}

window.logout = function() {

  signOut(auth)
  .then(() => {
    document.getElementById("status").innerText = "✅ Logged out";
  });

}

</script>

</body>
</html>
