<script>
localStorage.removeItem("username");
</script>

<!DOCTYPE html>
<html>
<head>
  <title>King Chat App</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
      margin: 0;
    }

    h2 {
      background: #1877f2;
      color: white;
      padding: 15px;
      margin: 0;
    }

    #messages {
      padding: 10px;
      height: 400px;
      overflow-y: scroll;
      background: white;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #eee;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 20px;
      background: #1877f2;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>

</head>
<body>

<h2>King Chat App</h2>

<div id="messages"></div>

<div id="inputArea">
  <input type="text" id="messageInput" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAXTg2RHlKjug5nCx6UTJ6v4jiIVElaRlY",
  authDomain: "king-chat-app-a30e4.firebaseapp.com",
  projectId: "king-chat-app-a30e4",
  storageBucket: "king-chat-app-a30e4.firebasestorage.app",
  messagingSenderId: "791983811270",
  appId: "1:791983811270:web:6a8973ad8e1240a81e45c7"
};


// START FIREBASE
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// GET USERNAME
let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}


// SEND MESSAGE
window.sendMessage = async function () {

  const input = document.getElementById("messageInput");

  if (input.value === "") return;

  await addDoc(collection(db, "messages"), {
    sender: username,
    text: input.value,
    time: Date.now()
  });

  input.value = "";
};


// LOAD MESSAGES LIVE
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {

  const messagesDiv = document.getElementById("messages");

  messagesDiv.innerHTML = "";

  snapshot.forEach((doc) => {

    const msg = doc.data();

    messagesDiv.innerHTML +=
      "<p><b>" + msg.sender + ":</b> " + msg.text + "</p>";

  });

});

</script>


</body>
</html>
