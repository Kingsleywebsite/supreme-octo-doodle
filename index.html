<!DOCTYPE html>
<html>
<head>
  <title>King Chat App</title>
  <style>
    body {
      font-family: Arial;
      background: #f0f2f5;
    }

    h2 {
      background: #1877f2;
      color: white;
      padding: 15px;
    }

    #messages {
      background: white;
      height: 300px;
      overflow-y: scroll;
      padding: 10px;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      width: 75%;
    }

    button {
      padding: 10px;
      background: #1877f2;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h2>King Chat App</h2>

<div id="messages"></div>

<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXTg2RHlKjug5nCx6UTJ6v4jiIVElaRlY",
  authDomain: "king-chat-app-a30e4.firebaseapp.com",
  projectId: "king-chat-app-a30e4",
  storageBucket: "king-chat-app-a30e4.firebasestorage.app",
  messagingSenderId: "791983811270",
  appId: "1:791983811270:web:6a8973ad8e1240a81e45c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Ask user name and save it
let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

// Send message
window.sendMessage = async function () {

  const input = document.getElementById("messageInput");

  if (input.value === "") return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    sender: username,
    time: Date.now()
  });

  input.value = "";
}

// Load messages
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {

  const messagesDiv = document.getElementById("messages");

  messagesDiv.innerHTML = "";

  snapshot.forEach((doc) => {

    const msg = doc.data();

    messagesDiv.innerHTML += "<p><b>" + msg.sender + ":</b> " + msg.text + "</p>";

  });

});

</script>

</body>
</html>
