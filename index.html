<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXTg2RHlKjug5nCx6UTJ6v4jiIVElaRlY",
  authDomain: "king-chat-app-a30e4.firebaseapp.com",
  projectId: "king-chat-app-a30e4",
  storageBucket: "king-chat-app-a30e4.firebasestorage.app",
  messagingSenderId: "791983811270",
  appId: "1:791983811270:web:6a8973ad8e1240a81e45c7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Ask for username
let username = localStorage.getItem("username");

if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("username", username);
}

const messagesDiv = document.getElementById("messages");

const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  messagesDiv.innerHTML = "";
  snapshot.forEach((doc) => {
    const data = doc.data();
    messagesDiv.innerHTML += `<div><b>${data.sender}:</b> ${data.text}</div>`;
  });
});

window.sendMessage = async function () {
  const input = document.getElementById("messageInput");
  
  if (input.value === "") return;

  await addDoc(collection(db, "messages"), {
    text: input.value,
    sender: username,
    time: Date.now()
  });

  input.value = "";
};
</script>
